<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bientot - Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/uplot@1.6.24/dist/uPlot.iife.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/uplot@1.6.24/dist/uPlot.min.css">
    <style>
        .status-ok { color: #22c55e; }
        .status-warning { color: #eab308; }
        .status-critical { color: #ef4444; }
        .status-unknown { color: #6b7280; }
        .bg-status-ok { background-color: #22c55e; }
        .bg-status-warning { background-color: #eab308; }
        .bg-status-critical { background-color: #ef4444; }
        .card { @apply bg-gray-800 rounded-lg p-4; }
        .card-title { @apply text-sm font-medium text-gray-400 mb-1; }
        .card-value { @apply text-2xl font-bold; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-4 py-3 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Bientot</h1>
            <div class="flex items-center gap-4">
                <span id="log-stats" class="text-xs text-gray-500 font-mono"></span>
                <span id="last-update" class="text-xs text-gray-500"></span>
                <div id="global-status" class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-gray-500 animate-pulse"></span>
                    <span class="text-sm text-gray-400">Loading...</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 space-y-6">
        <!-- Alerts Section -->
        <section id="alerts-section">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                </svg>
                Active Alerts
                <span id="alerts-count" class="text-xs bg-gray-700 px-2 py-0.5 rounded-full">0</span>
            </h2>
            <div id="alerts-container" class="space-y-2"></div>
        </section>

        <!-- Overview Cards -->
        <section>
            <h2 class="text-lg font-semibold mb-4">Overview</h2>
            <div id="overview-cards" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4"></div>
        </section>

        <!-- System Metrics -->
        <section>
            <h2 class="text-lg font-semibold mb-4">System Metrics</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="bg-gray-800 rounded-lg p-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm text-gray-400">CPU</span>
                        <span id="cpu-value" class="text-lg font-bold">--</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-2">
                        <div id="cpu-bar" class="bg-blue-500 h-2 rounded-full transition-all" style="width: 0%"></div>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-lg p-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm text-gray-400">Memory</span>
                        <span id="memory-value" class="text-lg font-bold">--</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-2">
                        <div id="memory-bar" class="bg-green-500 h-2 rounded-full transition-all" style="width: 0%"></div>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-lg p-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm text-gray-400">Disk</span>
                        <span id="disk-value" class="text-lg font-bold">--</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-2">
                        <div id="disk-bar" class="bg-yellow-500 h-2 rounded-full transition-all" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Charts Section -->
        <section>
            <h2 class="text-lg font-semibold mb-4">Trends (24h)</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-gray-800 rounded-lg p-4">
                    <h3 class="text-sm font-medium text-gray-400 mb-4">CPU Usage</h3>
                    <div id="chart-cpu" class="h-48"></div>
                </div>
                <div class="bg-gray-800 rounded-lg p-4">
                    <h3 class="text-sm font-medium text-gray-400 mb-4">Memory Usage</h3>
                    <div id="chart-memory" class="h-48"></div>
                </div>
            </div>
        </section>

        <!-- Logs Section -->
        <section id="logs-section" class="hidden">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                Logs
                <span id="logs-count" class="text-xs bg-gray-700 px-2 py-0.5 rounded-full">0</span>
            </h2>
            <div class="mb-3 flex flex-wrap gap-2">
                <select id="log-filter-source" class="bg-gray-800 border border-gray-700 text-sm rounded px-2 py-1">
                    <option value="">All sources</option>
                    <option value="ssh">SSH</option>
                    <option value="nftables">nftables</option>
                    <option value="ufw">UFW</option>
                    <option value="docker">Docker</option>
                    <option value="crowdsec">CrowdSec</option>
                </select>
                <select id="log-filter-severity" class="bg-gray-800 border border-gray-700 text-sm rounded px-2 py-1">
                    <option value="">All severities</option>
                    <option value="info">Info</option>
                    <option value="warning">Warning</option>
                    <option value="error">Error</option>
                    <option value="critical">Critical</option>
                </select>
            </div>
            <div class="bg-gray-800 rounded-lg overflow-hidden">
                <table class="w-full text-sm">
                    <thead class="bg-gray-750">
                        <tr class="text-left text-gray-400 text-xs uppercase">
                            <th class="px-3 py-2 w-40">Time</th>
                            <th class="px-3 py-2 w-24">Source</th>
                            <th class="px-3 py-2 w-20">Severity</th>
                            <th class="px-3 py-2">Message</th>
                        </tr>
                    </thead>
                    <tbody id="logs-table-body" class="divide-y divide-gray-700"></tbody>
                </table>
            </div>
        </section>

        <!-- Services Section -->
        <section id="services-section" class="hidden">
            <h2 class="text-lg font-semibold mb-4">Services</h2>
            <div id="services-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <footer class="max-w-7xl mx-auto p-4 text-center text-gray-600 text-sm">
        Bientot &mdash; Lightweight monitoring dashboard
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
