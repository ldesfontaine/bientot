{{define "content"}}
<div>
  <h1 class="page-title">{{.Title}}</h1>
  <p class="page-subtitle">{{.Subtitle}}</p>

  <div class="card-row cols-3">
    <div class="card kpi-card">
      <div class="kpi-label">
        <span class="label">Status</span>
      </div>
      <div class="kpi-value" style="color: var(--ok);">Online</div>
      <div class="kpi-meta">updated just now</div>
    </div>

    <div class="card kpi-card">
      <div class="kpi-label">
        <span class="label">Uptime (placeholder)</span>
      </div>
      <div class="kpi-value">{{fmtDuration .UptimeFake}}</div>
      <div class="kpi-meta">hardcoded until 5.3</div>
    </div>

    <div class="card kpi-card">
      <div class="kpi-label">
        <span class="label">Rendered at</span>
      </div>
      <div class="kpi-value mono">{{.RenderedAt}}</div>
      <div class="kpi-meta">server time (UTC)</div>
    </div>
  </div>

  <p class="mt-8 subtle" style="font-size: var(--fs-sm);">
    This is a placeholder page. Real data will be wired up in feature 5.3.
  </p>
</div>
{{end}}
