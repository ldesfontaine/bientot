services:
  server:
    build:
      context: .
      target: server
    container_name: bientot-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - DB_PATH=/data/bientot.db
      - DASHBOARD_ADDR=0.0.0.0:3001
      - AGENT_ADDR=0.0.0.0:3002

  agent:
    build:
      context: .
      target: agent
    container_name: bientot-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      - BIENTOT_SERVER_URL=http://localhost:3002
    depends_on:
      - server
