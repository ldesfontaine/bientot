alerts:
  # ZFS disk usage (computed by ZFS collector)
  - name: zfs_disk_critical
    expr: zfs_pool_used_percent > 90
    severity: critical
    message: "ZFS pool {{ .Labels.pool }} disk critical: {{ .Value }}%"

  - name: zfs_disk_warning
    expr: zfs_pool_used_percent > 80
    severity: warning
    message: "ZFS pool {{ .Labels.pool }} disk high: {{ .Value }}%"

  # ZFS health
  - name: zfs_degraded
    expr: zfs_pool_health < 2
    severity: critical
    message: "ZFS pool {{ .Labels.pool }} is degraded"

  # Docker containers
  - name: container_down
    expr: container_running == 0
    severity: critical
    message: "Container {{ .Labels.name }} is down"

  - name: container_unhealthy
    expr: container_health == 1
    severity: warning
    message: "Container {{ .Labels.name }} is unhealthy"

  # Backup freshness (json_file collector)
  - name: backup_stale
    expr: json_file_age_seconds > 172800
    severity: warning
    message: "Backup {{ .Labels.file }} is stale ({{ .Value }}s old)"

  # ZFS snapshot freshness
  - name: zfs_snapshot_stale
    expr: zfs_last_snapshot_age_seconds > 7200
    severity: warning
    message: "ZFS snapshot hourly is stale ({{ .Value }}s since last snapshot)"

notifiers:
  - type: ntfy
    url: ${NTFY_SERVER_URL}
    topic: ${NTFY_TOPIC}
    token: ${NTFY_TOKEN}
    severity_filter:
      - critical
      - warning
