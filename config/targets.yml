collectors:
  # Prometheus-format endpoints (node-exporter)
  prometheus:
    - name: node-pi
      url: ${NODE_EXPORTER_PI_URL}/metrics
      interval: 30s
    - name: node-vps
      url: ${NODE_EXPORTER_VPS_URL}/metrics
      interval: 30s
    - name: crowdsec-vps
      url: ${CROWDSEC_METRICS_URL}/metrics
      interval: 60s

  # CrowdSec Prometheus metrics (port 6060 exposes Prometheus format)
  crowdsec: []
    # Scraped as Prometheus target instead — see prometheus section

  # JSON files (backup status)
  json_file:
    - name: backup-vps
      path: ${BACKUP_STATUS_DIR}/vps-latest.json
      interval: 5m
    - name: backup-usb
      path: ${BACKUP_STATUS_DIR}/usb-latest.json
      interval: 5m

  # Docker container health
  docker:
    enabled: true
    socket: /var/run/docker.sock
    interval: 30s

  # ZFS pool status
  zfs:
    enabled: true
    pools:
      - tank
    interval: 60s
