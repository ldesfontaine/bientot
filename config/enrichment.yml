enrichment:
  enabled: true

  geoip:
    db_path: "${GEOIP_DB_PATH}"
    auto_update: true
    license_key: "${MAXMIND_LICENSE}"

  blocklists:
    update_interval: "24h"
    sources:
      - name: "emerging-threats"
        url: "https://rules.emergingthreats.net/fwrules/emerging-Block-IPs.txt"
        format: "ip-per-line"
      - name: "blocklist-de"
        url: "https://lists.blocklist.de/lists/all.txt"
        format: "ip-per-line"
      - name: "firehol-level1"
        url: "https://iplists.firehol.org/files/firehol_level1.netset"
        format: "cidr-per-line"

  providers:
    abuseipdb:
      enabled: true
      api_key: "${ABUSEIPDB_API_KEY}"
      daily_limit: 1000
      priority: 1
    greynoise:
      enabled: true
      api_key: "${GREYNOISE_API_KEY}"
      daily_limit: 100
      priority: 2
    crowdsec_cti:
      enabled: true
      api_key: "${CROWDSEC_CTI_KEY}"
      daily_limit: 50
      priority: 3
