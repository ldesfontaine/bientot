name: Build & Push Docker Images

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # Requis pour cosign keyless (signing OIDC)

    strategy:
      matrix:
        include:
          - target: agent
            image: bientot-agent
          - target: server
            image: bientot-server

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire la version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/ldesfontaine/${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/ldesfontaine/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Installer cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Signer l'image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          OWNER="${{ github.repository_owner }}"
          IMAGE="${{ env.REGISTRY }}/${OWNER,,}/${{ matrix.image }}"    # ${VAR,,} = lowercase en bash
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${{ steps.version.outputs.version }}" --format '{{.Manifest.Digest}}')
          cosign sign --yes "${IMAGE}@${DIGEST}"
