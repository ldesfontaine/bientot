# .github/workflows/release.yml
# Triggered by pushing a tag matching v*.
# Runs GoReleaser to build multi-arch binaries, Docker images, and publish
# everything to GitHub Releases + GHCR.
#
# Also supports workflow_dispatch for dry-run validation (snapshot mode,
# skips publishing).
name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# GoReleaser needs these permissions:
# - contents:write  -> create GitHub release, upload artifacts
# - packages:write  -> push images to ghcr.io
permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GoReleaser reads the full history to generate the changelog
          # between the current and previous tag.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >-
            ${{ github.event_name == 'workflow_dispatch' && 'release --snapshot --clean --skip=publish' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
