# .golangci.yml — golangci-lint v2 configuration
# Docs: https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

  settings:
    gosec:
      excludes:
        # G104 is redundant with errcheck.
        - G104
    revive:
      rules:
        - name: exported
          disabled: false
          arguments:
            - "disableStutteringCheck"

  exclusions:
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - revive

formatters:
  enable:
    - gofmt
    - goimports
