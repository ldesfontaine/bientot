services:
  step-ca:
    image: smallstep/step-ca:0.27.5
    container_name: bientot-step-ca-dev
    restart: unless-stopped
    environment:
      DOCKER_STEPCA_INIT_NAME: Bientot Internal CA
      DOCKER_STEPCA_INIT_DNS_NAMES: step-ca,localhost
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: bientot
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
      DOCKER_STEPCA_INIT_PASSWORD: ${STEP_CA_PASSWORD:?STEP_CA_PASSWORD is required, see .env.example}
    volumes:
      - step-data:/home/step
    networks:
      - bientot-ca

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: bientot-dashboard-dev
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "8443:8443"
    volumes:
      - ./deploy/certs/dashboard/server.crt:/etc/bientot/certs/server.crt:ro
      - ./deploy/certs/dashboard/server.key:/etc/bientot/certs/server.key:ro
      - ./deploy/certs/dashboard/ca-bundle.crt:/etc/bientot/certs/ca-bundle.crt:ro
      - ./deploy/certs/dashboard/agent-keys:/etc/bientot/agent-keys:ro
    networks:
      - bientot-internal

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: bientot-node-exporter-dev
    restart: unless-stopped
    networks:
      - bientot-internal
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--web.listen-address=:9100'

  agent-vps:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    container_name: bientot-agent-vps-dev
    restart: unless-stopped
    depends_on:
      - dashboard
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      BIENTOT_CONFIG: /etc/bientot/agent.yaml
    volumes:
      - ./deploy/certs/agent-vps/client.crt:/etc/bientot/certs/client.crt:ro
      - ./deploy/certs/agent-vps/client.key:/etc/bientot/certs/client.key:ro
      - ./deploy/certs/agent-vps/ca-bundle.crt:/etc/bientot/certs/ca-bundle.crt:ro
      - ./deploy/certs/agent-vps/signing.key:/etc/bientot/keys/signing.key:ro
      - ./deploy/agent.yaml:/etc/bientot/agent.yaml:ro
    networks:
      - bientot-internal

networks:
  bientot-ca:
    driver: bridge
  bientot-internal:
    driver: bridge

volumes:
  step-data:
