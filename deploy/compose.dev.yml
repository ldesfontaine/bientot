services:
  step-ca:
    image: smallstep/step-ca:0.27.5
    container_name: bientot-step-ca-dev
    restart: unless-stopped
    environment:
      DOCKER_STEPCA_INIT_NAME: Bientot Internal CA
      DOCKER_STEPCA_INIT_DNS_NAMES: step-ca,localhost
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: bientot
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
      DOCKER_STEPCA_INIT_PASSWORD: ${STEP_CA_PASSWORD:?STEP_CA_PASSWORD is required, see .env.example}
    volumes:
      - step-data:/home/step
    networks:
      - bientot-ca

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: bientot-dashboard-dev
    restart: unless-stopped
    networks:
      - bientot-ca
      - bientot-internal

  agent-vps:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    container_name: bientot-agent-vps-dev
    depends_on:
      - dashboard
    restart: unless-stopped
    networks:
      - bientot-internal

networks:
  bientot-ca:
    driver: bridge
  bientot-internal:
    driver: bridge

volumes:
  step-data:
